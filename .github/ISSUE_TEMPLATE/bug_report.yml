name: Bug Report
description: Report a reproducible bug in Kepler.
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below as completely as possible.
        Before submitting, **search existing issues** to make sure this hasn't already been reported.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of what the bug is.
      placeholder: e.g. "Clicking Save on the settings page does not save changes persistently."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Exact steps that reliably trigger the bug.
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. Enter the value ...
        4. Observe that ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
      placeholder: e.g. "Clicking save should actually save settings.""
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Paste error messages verbatim.
      placeholder: e.g. "Clicking save saves the current settings, but after restarting the application, they are reset to default."
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How much does this impact your use of Kepler?
      options:
        - 'Low (minor issue or cosmetic defect)'
        - 'Medium (feature broken, but a workaround exists)'
        - 'High (core feature broken with no workaround)'
        - 'Critical (data loss or complete service outage)'
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Kepler Version
      description: Which version of Kepler are you using?
      placeholder: 'e.g. "0.5.0"'
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: macOS Version
      placeholder: e.g. "15.2 Sequoia", "26.1 Tahoe"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs and Screenshots
      description: Paste relevant log output or stack traces, and attach screenshots if helpful.
      render: shell
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Anything else that might be relevant — frequency, related issues, workarounds, recent environment changes.
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: I have reproduced this on the latest version of Kepler.
          required: true
