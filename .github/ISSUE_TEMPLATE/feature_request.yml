name: Feature Request
description: Suggest a new feature or improvement for Kepler.
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please fill out the form below.
        Before submitting, **search existing issues** to see if this has already been requested.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the feature or improvement you'd like to see, in as much detail as possible.
      placeholder: "e.g. I'd like to be able to search the web directly from Kepler."
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: If this request is motivated by a specific problem or friction point, describe it here.
      placeholder: "e.g. Right now I have to switch to the browser just to do a quick search, which breaks my flow."
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you found any workarounds or alternative approaches? Why don't they fully solve the problem?
    validations:
      required: false

  - type: dropdown
    id: impact
    attributes:
      label: Impact
      description: How much would this feature improve your use of Kepler?
      options:
        - 'Nice to have (small quality-of-life improvement)'
        - 'Helpful (would meaningfully improve my workflow)'
        - 'Important (I work around its absence regularly)'
        - 'Blocking (I cannot use Kepler effectively without this)'
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Mockups, examples from other tools, related issues, or any other context that supports this request.
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this has not already been requested.
          required: true
        - label: This request describes a single feature, not multiple unrelated improvements.
          required: true
